name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore', '.github/**']

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

# Global defaults to ensure test failures block the pipeline
defaults:
  run:
    # Fail fast on any error
    # -e (errexit): exit immediately on error
    # -o pipefail: pipeline commands fail on first error
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  # Stage 1: Quick Python validation (30-60 seconds)
  quick-checks:
    name: Quick Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          pip install ruff mypy

      - name: Check formatting (ruff format)
        run: |
          ruff format --check app.py tests/ sports/ || (echo "❌ Code formatting issues found. Run 'ruff format app.py tests/ sports/' to fix." && exit 1)

      - name: Lint code (ruff check)
        run: |
          ruff check app.py tests/ sports/

  # Stage 2: Tests and SonarCloud analysis (2-3 minutes)
  sonarcloud:
    name: Tests & SonarCloud Analysis
    needs: quick-checks  # Only run if quick checks pass
    runs-on: ubuntu-latest
    # Explicitly prevent this job from continuing on error
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js dependencies
        run: |
          npm install

      - name: Run Python tests with coverage
        id: python-tests
        # Explicitly fail on test failure (no continue-on-error, no || true)
        run: |
          pytest tests/unit/ tests/edge_cases/ --cov=app --cov=sports --cov-report=xml:coverage.xml --cov-report=term-missing
        continue-on-error: false

      - name: Run JavaScript tests with coverage
        id: js-tests
        # Explicitly fail on test failure (no continue-on-error, no || true)
        run: |
          npm test -- --coverage --watchAll=false
        continue-on-error: false

      - name: Copy coverage files for SonarQube
        run: |
          # Copy Jest coverage from CI directory structure
          if [ -f "coverage/lcov.info" ]; then
            cp coverage/lcov.info lcov.info
            echo "✅ Copied coverage/lcov.info to lcov.info"
          fi
          # Verify coverage files exist
          ls -la coverage.xml lcov.info 2>/dev/null || echo "⚠️ Coverage files not found"

      - name: SonarCloud Scan
        if: github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Verify all critical steps succeeded
      - name: Verify test success
        if: always()
        run: |
          if [ "${{ steps.python-tests.outcome }}" != "success" ]; then
            echo "❌ Python tests failed"
            exit 1
          fi
          if [ "${{ steps.js-tests.outcome }}" != "success" ]; then
            echo "❌ JavaScript tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
