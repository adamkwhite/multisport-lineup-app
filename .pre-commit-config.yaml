# Pre-commit hooks for multisport-lineup-app
# Matches Quick Validation stage in .github/workflows/pr-validation.yml
# Run manually: pre-commit run --all-files

repos:
  # Ruff - Python linter and formatter (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(app\.py|tests/|scripts/|sports/)
      - id: ruff-format
        files: ^(app\.py|tests/|scripts/|sports/)

  # Built-in hooks for common issues
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: mixed-line-ending

  # Gitleaks - Secret scanning (prevents committing API keys, tokens, credentials)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

# Global settings
default_language_version:
  python: python3.12
